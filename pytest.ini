[pytest]
# Core suite = the pipeline + the contrib TEMPLATE (so the template can't rot).
# Student pipelines under contrib/<name>/ are their own exercise — run them
# explicitly (`pytest contrib/<name>`), not in the default/CI sweep. That keeps
# CI green and sidesteps duplicate test-file name clashes across many contribs.
testpaths = pipeline/tests contrib/_template
markers =
    live: hits the real datos.gov.co API (skipped in CI; run with -m live)
addopts = -ra
