name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (skill + pipeline + contrib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        working-directory: pipeline
        run: uv sync --extra dev
      - name: Run tests (offline — cassettes replayed, no network)
        run: uv run --project pipeline pytest -m "not live"

  web:
    name: Web (Next.js build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build
